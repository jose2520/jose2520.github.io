<!-- Main portfolio HTML file. Defines the page structure, loads dynamic modules, and includes organized script and style order. -->
<!doctype html>
<html lang="es" data-theme="dark">
     <!-- ══════════════════════════════[ HEAD — Meta, Fuentes, Estilos]══════════════════════════════ -->
     <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <meta name="description" content="Jose Diaz — Junior Developer & Imagineer. Portfolio personal."/>
          <meta name="author" content="Jose Diaz" />
          <title>Jose.dev — Developer &amp; Imagineer</title>
          <!-- [ Fuentes ] -->
          <link rel="preconnect" href="https://fonts.googleapis.com" />
          <link
               href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600;700&display=swap"
               rel="stylesheet"
          />
          <!-- [ Iconos ] -->
          <link
               rel="stylesheet"
               href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          />

          <!-- [ Modular styles organized - load order: Base → Themes → Components → Utilities → Animations ] -->
          <link rel="stylesheet" href="src/css/base/reset.css" />
          <link rel="stylesheet" href="src/css/themes/variables.css" />
          <link rel="stylesheet" href="src/css/base/base.css" />
          <link rel="stylesheet" href="src/css/utilities/utilities.css" />
          <link rel="stylesheet" href="src/css/utilities/effects.css" />
          <link rel="stylesheet" href="src/css/components/navbar.css" />
          <link rel="stylesheet" href="src/css/components/hero.css" />
          <link rel="stylesheet" href="src/css/components/about.css" />
          <link rel="stylesheet" href="src/css/components/tools.css" />
          <link rel="stylesheet" href="src/css/components/projects.css" />
          <link rel="stylesheet" href="src/css/components/contact.css" />
          <link rel="stylesheet" href="src/css/components/footer.css" />
          <link rel="stylesheet" href="src/css/animations/animations.css" />
          <link rel="stylesheet" href="src/css/animations/cursor.css" />
          <link rel="stylesheet" href="src/css/animations/responsive.css" />
     </head>

     <!-- ══════════════════════════════[ BODY ]══════════════════════════════ -->
     <body>
          <!-- Custom cursor elements -->
          <div class="cursor" id="cursor"></div>
          <div class="cursor-ring" id="cursor-ring"></div>
          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 0 · Global background layers                        │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-background"></div>

          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 1 · Main navigation                                 │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-nav"></div>

          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 2 · Hero — Introduction                             │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-hero"></div>

          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 3 · About Me — Behind the keyboard                  │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-about"></div>

          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 4 · Tools — My toy box                              │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-tools"></div>

          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 5 · Projects — My adventures                        │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-projects"></div>

          <!-- ┌──────────────────────────────────────────────────────────────┐
               │  MODULE 6 · Contact — Shall we build something epic together?│
               └──────────────────────────────────────────────────────────────┘ -->
          <div id="mod-contact"></div>

          <!-- ┌─────────────────────────────────────────────────────────────┐
               │  MODULE 7 · Footer                                          │
               └─────────────────────────────────────────────────────────────┘ -->
          <div id="mod-footer"></div>

          <!-- Contenido cargado dinámicamente desde src/js/core/modules.js -->
          <!-- Each HTML module is injected into its container via fetch() -->
          <!-- ══════════════════════════════[ SCRIPTS ORGANIZADOS ]═════════════════════════════ -->
          <!-- Orden de carga: Core → Features → Modules → Utils -->
          <script src="src/js/core/core.js"></script>
          <script src="src/js/core/interactions.js"></script>
          <script src="src/js/core/modules.js"></script>
          <script src="src/js/features/theme.js"></script>
          <script src="src/js/features/smooth-nav.js"></script>
          <script src="src/js/features/typing-effect.js"></script>
          <script src="src/js/features/decorations.js"></script>
          <script src="src/js/features/canvas.js"></script>
          <!-- EmailJS SDK (necesario para envío de emails desde el cliente) -->
          <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
          <script src="src/js/utils/forms.js"></script>
          <script src="src/js/utils/cursor.js"></script>
     </body>
</html>
