<!-- Módulo Tools: Sección de herramientas y tecnologías organizadas en categorías con tarjetas. -->
<section class="tools" id="tools" aria-label="Herramientas y tecnologías">
  <div class="tools-container">
    <!-- [ Encabezado de sección ] -->
    <div class="section-header reveal">
      <h2 class="section-title">
        <i class="fas fa-toolbox" aria-hidden="true"></i> Mi Caja de
        Juguetes
      </h2>
      <p class="section-sub">
        Herramientas que uso para construir el futuro
      </p>
      <div class="title-line" aria-hidden="true"></div>
    </div>

    <!-- [ Grid de categorías ] -->
    <div class="tools-grid">
      <!-- ── Sub-módulo 4.1: Lenguajes ── -->
      <div
        class="tool-category reveal"
        role="region"
        aria-label="Lenguajes de programación"
      >
        <h3 class="category-title">
          <i class="fas fa-code" aria-hidden="true"></i> Lenguajes
        </h3>

        <div class="tools-list" role="list">
          <div class="tool-card" role="listitem" data-tooltip="JavaScript">
            <div class="tool-icon js-icon">
              <i class="fab fa-js-square" aria-hidden="true"></i>
            </div>
            <span>JavaScript</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Python">
            <div class="tool-icon py-icon">
              <i class="fab fa-python" aria-hidden="true"></i>
            </div>
            <span>Python</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="PHP">
            <div class="tool-icon php-icon">
              <i class="fab fa-php" aria-hidden="true"></i>
            </div>
            <span>PHP</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="TypeScript">
            <div class="tool-icon ts-icon">
              <span class="ts-logo">TS</span>
            </div>
            <span>TypeScript</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="HTML / CSS">
            <div class="tool-icon html-icon">
              <i class="fab fa-html5" aria-hidden="true"></i>
            </div>
            <span>HTML/CSS</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="SQL">
            <div class="tool-icon sql-icon">
              <i class="fas fa-database" aria-hidden="true"></i>
            </div>
            <span>SQL</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="NoSQL">
            <div class="tool-icon nosql-icon">
              <i class="fas fa-cubes" aria-hidden="true"></i>
            </div>
            <span>NoSQL</span>
          </div>
        </div>
        <!-- /tools-list lenguajes -->
      </div>
      <!-- /tool-category lenguajes -->

      <!-- ── Sub-módulo 4.2: Tecnologías / Frameworks ── -->
      <div
        class="tool-category reveal"
        role="region"
        aria-label="Frameworks y tecnologías"
      >
        <h3 class="category-title">
          <i class="fas fa-layer-group" aria-hidden="true"></i> Tecnologías
        </h3>

        <div class="tools-list" role="list">
          <div class="tool-card" role="listitem" data-tooltip="React">
            <div class="tool-icon react-icon">
              <i class="fab fa-react" aria-hidden="true"></i>
            </div>
            <span>React</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Node.js">
            <div class="tool-icon node-icon">
              <i class="fab fa-node-js" aria-hidden="true"></i>
            </div>
            <span>Node.js</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Vue.js">
            <div class="tool-icon vue-icon">
              <i class="fab fa-vuejs" aria-hidden="true"></i>
            </div>
            <span>Vue</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Angular">
            <div class="tool-icon angular-icon">
              <i class="fab fa-angular" aria-hidden="true"></i>
            </div>
            <span>Angular</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Laravel">
            <div class="tool-icon laravel-icon">
              <i class="fab fa-laravel" aria-hidden="true"></i>
            </div>
            <span>Laravel</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Bootstrap 5">
            <div class="tool-icon bootstrap-icon">
              <i class="fab fa-bootstrap" aria-hidden="true"></i>
            </div>
            <span>Bootstrap 5</span>
          </div>

          <div
            class="tool-card"
            role="listitem"
            data-tooltip="React Native"
          >
            <div class="tool-icon rn-icon">
              <i class="fab fa-react" aria-hidden="true"></i>
            </div>
            <span>React Native</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Flutter">
            <div class="tool-icon flutter-icon">
              <i class="fas fa-mobile-alt" aria-hidden="true"></i>
            </div>
            <span>Flutter</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Git">
            <div class="tool-icon git-icon">
              <i class="fab fa-git-alt" aria-hidden="true"></i>
            </div>
            <span>Git</span>
          </div>
        </div>
        <!-- /tools-list tecnologías -->
      </div>
      <!-- /tool-category tecnologías -->

      <!-- ── Sub-módulo 4.3: Bases de Datos ── -->
      <div
        class="tool-category reveal"
        role="region"
        aria-label="Bases de datos"
      >
        <h3 class="category-title">
          <i class="fas fa-database" aria-hidden="true"></i> Base de Datos
        </h3>

        <div class="tools-list" role="list">
          <div class="tool-card" role="listitem" data-tooltip="MySQL">
            <div class="tool-icon mysql-icon">
              <i class="fas fa-database" aria-hidden="true"></i>
            </div>
            <span>MySQL</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="MongoDB">
            <div class="tool-icon mongo-icon">
              <i class="fas fa-leaf" aria-hidden="true"></i>
            </div>
            <span>MongoDB</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="PostgreSQL">
            <div class="tool-icon pg-icon">
              <i class="fas fa-server" aria-hidden="true"></i>
            </div>
            <span>PostgreSQL</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="Firebase">
            <div class="tool-icon fire-icon">
              <i class="fas fa-fire-alt" aria-hidden="true"></i>
            </div>
            <span>Firebase</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="phpAdmin">
            <div class="tool-icon phpadmin-icon">
              <i class="fab fa-php" aria-hidden="true"></i>
            </div>
            <span>phpAdmin</span>
          </div>

          <div class="tool-card" role="listitem" data-tooltip="MariaDB">
            <div class="tool-icon mariadb-icon">
              <i class="fas fa-database" aria-hidden="true"></i>
            </div>
            <span>MariaDB</span>
          </div>
        </div>
        <!-- /tools-list bases-de-datos -->
      </div>
      <!-- /tool-category bases-de-datos -->
    </div>
    <!-- /tools-grid -->
  </div>
  <!-- /tools-container -->
</section>
<!-- /mod-tools -->
