<!-- Main navigation module: contains header, logo, nav menu, resume download, and theme toggle. -->
<header id="mod-nav">
  <nav
    class="navbar"
    id="navbar"
    role="navigation"
    aria-label="Navegación principal"
  >
    <!-- [ Main bar ] -->
    <div class="nav-container">
      <!-- Logo -->
      <a href="#home" class="nav-logo" aria-label="Ir al inicio">
        <span class="logo-j">Jose</span><span class="logo-dot">.dev</span>
      </a>

      <!-- Navigation links (desktop) -->
      <ul class="nav-links" role="menubar">
        <li role="none">
          <a href="#about" role="menuitem">Mi Historia</a>
        </li>
        <li role="none">
          <a href="#tools" role="menuitem">Herramientas</a>
        </li>
        <li role="none">
          <a href="#projects" role="menuitem">Creaciones</a>
        </li>
        <li role="none"><a href="#contact" role="menuitem">Jose!</a></li>
      </ul>

      <!-- Actions: resume + theme toggle -->
      <div class="nav-actions">
        <!-- Download resume -->
        <a href="#" class="btn-cv" aria-label="Descargar CV">
          <i class="fas fa-file-code" aria-hidden="true"></i> CV Mágico
        </a>

        <!-- Light/dark mode button -->
        <button
          class="theme-toggle"
          id="themeToggle"
          aria-label="Cambiar tema claro/oscuro"
        >
          <span class="toggle-track" aria-hidden="true">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>

      <!-- Hamburger button (mobile) -->
      <button
        class="hamburger"
        id="hamburger"
        aria-label="Abrir menú"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <!-- /nav-container -->

    <!-- [ Mobile dropdown menu ] -->
    <div class="mobile-menu" id="mobileMenu" role="menu" aria-hidden="true">
      <!-- Mobile actions (theme toggle visible on small screens) -->
      <div class="mobile-menu-actions">
        <button class="theme-toggle" aria-label="Cambiar tema claro/oscuro (móvil)">
          <span class="toggle-track" aria-hidden="true">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
      <ul>
        <li><a href="#about" role="menuitem">Mi Historia</a></li>
        <li><a href="#tools" role="menuitem">Herramientas</a></li>
        <li><a href="#projects" role="menuitem">Creaciones</a></li>
        <li><a href="#contact" role="menuitem">Jose!</a></li>
        <!-- Download resume -->
        <li role="none">
          <a href="#" class="btn-cv" aria-label="Descargar CV">
            <i class="fas fa-file-code" aria-hidden="true"></i> CV Mágico
          </a>
        </li>
      </ul>
    </div>
    <!-- /mobile-menu -->
  </nav>
</header>
<!-- /mod-nav -->
